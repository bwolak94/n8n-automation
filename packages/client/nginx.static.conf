server {
    listen 80;
    root /usr/share/nginx/html;

    # SPA fallback — all unknown paths return index.html so Vue Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS/image assets aggressively (they are content-hashed by Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached (so new deploys take effect immediately)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
