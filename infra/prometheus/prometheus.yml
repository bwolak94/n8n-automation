global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: automation-hub

scrape_configs:
  - job_name: automation-hub-server
    static_configs:
      - targets:
          - server:4000
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
