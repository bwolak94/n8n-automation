worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream definitions ───────────────────────────────────────────────────
    upstream server_backend {
        server server:4000;
        keepalive 32;
    }

    upstream client_static {
        server client:80;
        keepalive 16;
    }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 50m;

        # ── Health check (public, no auth) ─────────────────────────────────────
        location = /health {
            proxy_pass         http://server_backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── REST API ───────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://server_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Socket.io (WebSocket upgrade required) ─────────────────────────────
        location /socket.io/ {
            proxy_pass         http://server_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;   # keep WebSocket alive
            proxy_send_timeout 3600s;
        }

        # ── Vue SPA (everything else) ──────────────────────────────────────────
        location / {
            proxy_pass         http://client_static/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # SPA fallback — client nginx handles try_files, but as an extra safety net
        location @spa_fallback {
            proxy_pass http://client_static/index.html;
        }
    }
}
