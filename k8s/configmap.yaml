apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: automation-hub
  labels:
    app.kubernetes.io/part-of: automation-hub
data:
  NODE_ENV: "production"
  PORT: "4000"
  # Service-DNS names resolve automatically within the cluster
  MONGODB_URI: "mongodb://mongo:27017/automation_hub"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "automation_hub"
  POSTGRES_USER: "postgres"
  REDIS_URL: "redis://redis:6379"
  JWT_EXPIRES_IN: "7d"
  # Override CORS_ORIGIN with your actual domain in production
  CORS_ORIGIN: "https://your-domain.com"
  ENABLE_AI: "true"
