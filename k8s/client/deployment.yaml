apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: client
    app.kubernetes.io/part-of: automation-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
        app.kubernetes.io/name: client
        app.kubernetes.io/part-of: automation-hub
    spec:
      containers:
        - name: client
          image: ghcr.io/your-org/automation-hub-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
