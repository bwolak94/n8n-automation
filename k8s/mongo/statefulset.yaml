apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/part-of: automation-hub
spec:
  serviceName: mongo
  replicas: 1   # Upgrade to a 3-node ReplicaSet for HA in production
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        app.kubernetes.io/name: mongo
        app.kubernetes.io/part-of: automation-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999     # mongodb user uid in the official image
        fsGroup: 999
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_DATABASE
              value: automation_hub
          args:
            - --wiredTigerCacheSizeGB
            - "0.5"   # Limit WiredTiger cache — increase for larger instances
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app.kubernetes.io/name: mongo
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
