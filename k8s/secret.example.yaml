# ============================================================================
# Secret template — DO NOT commit real values.
# Copy to secret.yaml, fill in base64-encoded values, then apply:
#
#   echo -n "your-secret" | base64
#   kubectl apply -f k8s/secret.yaml -n automation-hub
#
# In production prefer External Secrets Operator (AWS Secrets Manager,
# HashiCorp Vault, GCP Secret Manager) instead of plain k8s Secrets.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: server-secrets
  namespace: automation-hub
  labels:
    app.kubernetes.io/part-of: automation-hub
type: Opaque
data:
  # echo -n "min-32-character-random-string" | base64
  JWT_SECRET: <base64>

  # echo -n "your-postgres-password" | base64
  POSTGRES_PASSWORD: <base64>

  # echo -n "sk-ant-..." | base64
  ANTHROPIC_API_KEY: <base64>

  # echo -n "sk_live_..." | base64
  STRIPE_SECRET_KEY: <base64>

  # echo -n "whsec_..." | base64
  STRIPE_WEBHOOK_SECRET: <base64>
