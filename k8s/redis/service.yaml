apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: automation-hub
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  # ClusterIP — Redis is internal only; never expose externally
  type: ClusterIP
