apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: automation-hub
spec:
  serviceName: postgres
  replicas: 1          # Scale reads with read-replicas; writes stay on primary
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: automation-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70      # postgres user uid in the official image
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: automation_hub
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: server-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: server-secrets
                  key: POSTGRES_PASSWORD
            # Store data on the persistent volume (not the overlay)
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d automation_hub
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d automation_hub
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
