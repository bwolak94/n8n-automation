apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: automation-hub
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: automation-hub
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  # Headless service for StatefulSet — each pod gets a stable DNS entry
  # postgres-0.postgres.automation-hub.svc.cluster.local
  clusterIP: None
