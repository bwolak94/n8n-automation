# Apply everything in dependency order:
#   kubectl apply -k k8s/
#
# Or apply manually in order:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/configmap.yaml
#   kubectl apply -f k8s/secret.yaml         # (copy from secret.example.yaml)
#   kubectl apply -f k8s/redis/
#   kubectl apply -f k8s/postgres/
#   kubectl apply -f k8s/mongo/
#   kubectl apply -f k8s/server/
#   kubectl apply -f k8s/client/
#   kubectl apply -f k8s/nginx/
#   kubectl apply -f k8s/ingress.yaml        # (optional, if using Ingress)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: automation-hub

resources:
  - namespace.yaml
  - configmap.yaml
  # secret.yaml is intentionally absent — manage secrets out of band
  - redis/pvc.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - mongo/statefulset.yaml
  - mongo/service.yaml
  - server/deployment.yaml
  - server/service.yaml
  - server/hpa.yaml
  - client/deployment.yaml
  - client/service.yaml
  - nginx/configmap.yaml
  - nginx/deployment.yaml
  - nginx/service.yaml

# Uncomment to use Ingress instead of LoadBalancer service:
# - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: automation-hub
  app.kubernetes.io/managed-by: kustomize
